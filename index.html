<!DOCTYPE html>
<html lang="pt - BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas 📝</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header><h1>Calculadora de Notas 📝</h1></header>
    <h2>Cadastro de Alunos: 🧑‍🎓</h2>

    <input type="text" id="nomeAluno" placeholder="Digite o nome de um aluno">
    <input type="number" id="notaUm" placeholder="Digite a primeira nota">
    <input type="number" id="notaDois" placeholder="Digite a segunda nota">
    <button id="btnCadastrar">Cadastrar: 🧑‍🎓</button>

    <h3>Filtrar por nome: 📝</h3>
    <input type="text" id="filtroNome" placeholder="Digite um nome">
    <button id="btnFiltrarNome">Filtrar: 📝</button>

    <input type="number" id="filtroMedia" placeholder="Digite uma média">
    <button id="btnFiltrarMedia">Filtrar: 📝</button>

    <h3>Lista de alunos: 🧑‍🎓</h3>
    <p id="listaAlunos"></p>

    <br><button id="btnFiltrarCincoMelhores">Filtar 5 melhores: 📝</button>

    <h3>Lista de melhores alunos: 📝</h3>
    <p id="listaAlunosMelhores"></p>

    <footer></footer>
</body>

</html>
